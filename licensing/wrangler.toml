name = "beacon-license"
main = "src/index.js"
compatibility_date = "2026-07-01"
account_id = "305ab75281717568c5612a2abcbc696e"

routes = [
  { pattern = "license.beaconmac.com", custom_domain = true }
]

# Public identifiers only (no secrets). LS_STORE_ID / LS_PRODUCT_ID scope
# license validation to Beacon's own store+product, so a license key from any
# other Lemon Squeezy store can't unlock Beacon. Fill these from the LS
# dashboard (Settings → Stores for the store ID; the product page URL / API for
# the product ID). PADDLE_PRICE_ID is kept for the dormant Paddle claim path.
[vars]
# LS product IDs are globally unique, so matching the product alone scopes
# validation to Beacon. LS_STORE_ID is an optional extra guard (leave blank).
LS_STORE_ID = ""
LS_PRODUCT_ID = "1241992"
PADDLE_PRICE_ID = "pri_01kxvfwbt3n2www7ahy6ep68fp"

[[kv_namespaces]]
binding = "LICENSES"
id = "51e09be30ab146dd9bb1fc033dae83ea"
